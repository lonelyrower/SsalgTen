# Docker Compose configuration using GHCR images
# 使用方法: docker-compose -f docker-compose.ghcr.yml up -d

services:
  # PostgreSQL Database
  database:
    image: postgres:16-alpine
    container_name: ssalgten-database
    restart: unless-stopped
    environment:
      POSTGRES_DB: ssalgten
      POSTGRES_USER: ssalgten
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ssalgten_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - ssalgten-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssalgten -d ssalgten"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Backend API Service (using GHCR image)
  backend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-lonelyrower/ssalgten}/backend:${IMAGE_TAG:-latest}
    container_name: ssalgten-backend
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: ${BACKEND_PORT:-3001}
      HOST: 0.0.0.0

      # Database Configuration
      DATABASE_URL: postgresql://ssalgten:${DB_PASSWORD:-ssalgten_password}@database:5432/ssalgten

      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # API Security
      API_KEY_SECRET: ${API_KEY_SECRET:-your-api-key-secret-change-this}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://${DOMAIN:-localhost}}
      FRONTEND_URL: ${FRONTEND_URL:-http://${DOMAIN:-localhost}}

      # Agent Configuration
      DEFAULT_AGENT_API_KEY: ${DEFAULT_AGENT_API_KEY:-default-agent-key-change-this}
      AGENT_HEARTBEAT_INTERVAL: ${AGENT_HEARTBEAT_INTERVAL:-30000}
      AGENT_REQUIRE_SIGNATURE: ${AGENT_REQUIRE_SIGNATURE:-false}

      # IP Info Service
      IPINFO_TOKEN: ${IPINFO_TOKEN:-}

      # Logging
      LOG_LEVEL: ${LOG_LEVEL:-info}
      ENABLE_MORGAN: ${ENABLE_MORGAN:-true}
    volumes:
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-3001}:${BACKEND_PORT:-3001}"
    networks:
      - ssalgten-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:' + (process.env.PORT || '3001') + '/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Frontend Web Service (using GHCR image)
  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-lonelyrower/ssalgten}/frontend:${IMAGE_TAG:-latest}
    container_name: ssalgten-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Frontend Environment Variables
      VITE_API_URL: ${VITE_API_URL:-/api}
      VITE_NODE_ENV: ${VITE_NODE_ENV:-production}
      VITE_ENABLE_DEBUG: ${VITE_ENABLE_DEBUG:-false}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    networks:
      - ssalgten-network
    deploy:
      resources:
        limits:
          memory: 128M
        reservations:
          memory: 64M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Updater Service (using GHCR image)
  updater:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-lonelyrower/ssalgten}/updater:${IMAGE_TAG:-latest}
    container_name: ssalgten-updater
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Updater specific environment variables
      API_BASE_URL: http://backend:3001/api
      UPDATE_INTERVAL: ${UPDATE_INTERVAL:-300000}  # 5 minutes
    networks:
      - ssalgten-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # Agent Service (using GHCR image)
  agent:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-lonelyrower/ssalgten}/agent:${IMAGE_TAG:-latest}
    container_name: ssalgten-agent
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      # Agent specific environment variables
      API_BASE_URL: http://backend:3001/api
      AGENT_API_KEY: ${AGENT_API_KEY:-default-agent-key-change-this}
      AGENT_NAME: ${AGENT_NAME:-local-agent}
    networks:
      - ssalgten-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

networks:
  ssalgten-network:
    driver: bridge
    name: ssalgten-network

volumes:
  postgres_data:
    name: ssalgten-postgres-data
  backend_logs:
    name: ssalgten-backend-logs