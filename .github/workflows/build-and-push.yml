name: Build and Push to GHCR

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend, updater, agent]

    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Prepare image namespace
      run: |
        IMAGE_NAMESPACE=${GITHUB_REPOSITORY,,}
        echo "IMAGE_NAMESPACE=$IMAGE_NAMESPACE" >> $GITHUB_ENV

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.component }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.${{ matrix.component }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  # 可选：构建完成后的健康检查
  health-check:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Test docker-compose with built images
      run: |
        # 使用构建的镜像更新 docker-compose 配置
        export BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest"
        export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest"

        # 基本的smoke test - 验证Docker工具可用
        docker --version
        command -v docker-compose >/dev/null && docker-compose --version || echo "docker-compose not available"

        # 验证镜像可以拉取
        docker pull $BACKEND_IMAGE
        docker pull $FRONTEND_IMAGE

        echo "✅ Images built and pushed successfully!"

  # 可选：发布Release时创建多架构manifest
  create-manifest:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        component: [backend, frontend, updater, agent]

    steps:
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create and push manifest
      run: |
        TAG=${GITHUB_REF#refs/tags/}
        IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.component }}"

        docker manifest create ${IMAGE_BASE}:${TAG} \
          ${IMAGE_BASE}:${TAG}

        docker manifest push ${IMAGE_BASE}:${TAG}